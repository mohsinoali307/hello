<style>

@keyframes copterKiAnimation {
    0%{
      right: 0px;
      bottom: 0px;   
    }

    25%{
        right: 0;
        bottom: 90%;
    }

    75%{
        bottom: 90%;
        right: 50%;

    }

    100%{
        right:50%;
        bottom: 0px;
    }
    
}


#copter{
    width: 100px;
    bottom: 0px;
    position: absolute;
    right: 0px;
    animation: copterKiAnimation 0.5s linear 0s;
    animation-iteration-count: infinite;
}

@keyframes faniANimation {
    0%{
        transform: rotate(0deg);
    }

    100%{
        transform: rotate(360deg);
    }
    
}

#myFan{
    position: absolute;
    animation: faniANimation 1s linear 0s;
    animation-iteration-count: infinite;

}
